<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title> For My Love Forever 💖</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div id="heartContainer"></div>

<div id="screen1" class="screen active">
    <div class="envelope" id="openEnvelope">
        <div class="envelope-body"></div>
        <div class="envelope-flap"></div>
        <div class="heart-seal">❤️</div>
    </div>
    <div class="intro-text">Hãy nhấp vào để khám phá điều bất ngờ 💘</div>
</div>

<div id="screen2" class="screen">
    <div class="pass-section">
        <p id="error2" class="error"></p>
        <div class="dots" id="dots2"></div>
        <input type="password" maxlength="8" id="pass2" oninput="checkPass2()" autofocus>
    </div>
    <div class="photo-grid" id="photoGrid"></div>
</div>

<div id="screen3" class="screen">
    <div class="screen3-wrap">
        <div class="left-photo">
            <img src="anhbentraipasscode/anhbentraipasscode.jpg" alt="Kỷ niệm">
        </div>
        <div class="pass-section">
            <p id="error3" class="error"></p>
            <div class="dots" id="dots3"></div>
            <input type="password" maxlength="6" id="pass3" oninput="checkPass3()">
        </div>
    </div>
</div>

<div id="screen4" class="screen">
    <div class="letter">
        <h2>Gửi em cô gái ngoại lệ của anh 💖</h2>
        <textarea placeholder="Viết nội dung bạn muốn tại đây...">Người con gái anh thương ơiii 😘
Chúc em 8/3 có một ngày thật vui vẻ đầy may mắn tràn đầy hạnh phúc 🍀
Lần đầu anh là quà kiểu này nên có gì sai sót ẻm bỏ qua cho ảnh nheeee ><
Anh thương cô gái nhỏ của anh nhắm á mình bên nhau thiệt lâu nhaaa đừng vì chút bất đồng mà bỏ nhau nha em ơiiii 🌷
Anh chỉ muốn nói là ""Anh yêu em - Anh thương em " 
Người gửi 
HiHoi yêu dấuuu <3 </textarea>
    </div>
</div>

<script src="script.js"></script>
</body>
</html>
